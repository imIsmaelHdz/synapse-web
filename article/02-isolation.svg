<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F6F5F3"/>
    <stop offset="100%" stop-color="#EDECE8"/>
  </linearGradient>
  <radialGradient id="oa" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#CFCFCC" stop-opacity="0.60"/>
    <stop offset="100%" stop-color="#CFCFCC" stop-opacity="0"/>
  </radialGradient>
  <filter id="cs" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#0000000D"/>
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000008"/>
  </filter>
  <!-- Clip for each card -->
  <clipPath id="cc1"><rect width="190" height="148" rx="18"/></clipPath>
  <clipPath id="cc2"><rect width="176" height="138" rx="18"/></clipPath>
  <clipPath id="cc3"><rect width="184" height="152" rx="18"/></clipPath>
  <clipPath id="cc4"><rect width="172" height="136" rx="18"/></clipPath>
  <clipPath id="cc5"><rect width="180" height="144" rx="18"/></clipPath>
</defs>

<!-- Background -->
<rect width="1000" height="540" fill="url(#bg)"/>
<ellipse cx="-60" cy="-40" rx="380" ry="380" fill="url(#oa)"/>
<ellipse cx="1060" cy="580" rx="320" ry="320" fill="#DDD7CD" opacity="0.40"/>

<!-- Title -->
<text x="500" y="58" text-anchor="middle" fill="#1C1C1E"
      font-family="Georgia,'Times New Roman',serif"
      font-size="26">The problem with isolated notes</text>

<!-- ═══════════════════════════════════════════
     CARD 1 — Book note (teal) — top left, slight left tilt
     ═══════════════════════════════════════════ -->
<g transform="translate(72, 100) rotate(-4, 95, 74)" filter="url(#cs)">
  <rect width="190" height="148" rx="18" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.68)" stroke-width="1.2"/>
  <!-- Top color strip -->
  <rect width="190" height="36" rx="0" fill="rgba(106,135,145,0.16)" clip-path="url(#cc1)"/>
  <rect width="190" height="36" rx="18" ry="18" fill="rgba(106,135,145,0.16)"/>
  <rect y="18" width="190" height="18" fill="rgba(106,135,145,0.16)"/>
  <!-- Icon label -->
  <text x="16" y="24" fill="#6A8791"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" letter-spacing="0.06em">📖  BOOK NOTE</text>
  <!-- Text lines -->
  <rect x="16" y="52" width="145" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <rect x="16" y="68" width="120" height="9" rx="4.5" fill="rgba(90,90,110,0.14)"/>
  <rect x="16" y="84" width="138" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <rect x="16" y="100" width="95"  height="9" rx="4.5" fill="rgba(90,90,110,0.12)"/>
  <!-- Source tag -->
  <rect x="14" y="120" width="88" height="18" rx="9" fill="rgba(106,135,145,0.12)" stroke="rgba(106,135,145,0.20)" stroke-width="1"/>
  <text x="58" y="132" text-anchor="middle" fill="#6A8791"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9.5" font-weight="600">Atomic Habits</text>
</g>

<!-- ═══════════════════════════════════════════
     CARD 2 — Movie note (terra) — top center, slight right tilt
     ═══════════════════════════════════════════ -->
<g transform="translate(408, 88) rotate(3, 88, 69)" filter="url(#cs)">
  <rect width="176" height="138" rx="18" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.68)" stroke-width="1.2"/>
  <!-- Top strip -->
  <rect width="176" height="34" rx="18" ry="18" fill="rgba(229,154,120,0.16)"/>
  <rect y="16" width="176" height="18" fill="rgba(229,154,120,0.16)"/>
  <text x="16" y="23" fill="#C67050"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" letter-spacing="0.06em">🎬  FILM NOTE</text>
  <!-- Text lines -->
  <rect x="16" y="50" width="138" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <rect x="16" y="66" width="108" height="9" rx="4.5" fill="rgba(90,90,110,0.14)"/>
  <rect x="16" y="82" width="125" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <!-- Source tag -->
  <rect x="14" y="108" width="72" height="18" rx="9" fill="rgba(229,154,120,0.12)" stroke="rgba(229,154,120,0.20)" stroke-width="1"/>
  <text x="50" y="120" text-anchor="middle" fill="#C67050"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9.5" font-weight="600">Arrival</text>
</g>

<!-- ═══════════════════════════════════════════
     CARD 3 — Podcast note (sage) — top right, left tilt
     ═══════════════════════════════════════════ -->
<g transform="translate(748, 96) rotate(-2.5, 92, 76)" filter="url(#cs)">
  <rect width="184" height="152" rx="18" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.68)" stroke-width="1.2"/>
  <!-- Top strip -->
  <rect width="184" height="36" rx="18" ry="18" fill="rgba(146,168,165,0.18)"/>
  <rect y="18" width="184" height="18" fill="rgba(146,168,165,0.18)"/>
  <text x="16" y="24" fill="#6A9490"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" letter-spacing="0.06em">🎧  PODCAST</text>
  <!-- Text lines -->
  <rect x="16" y="52" width="148" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <rect x="16" y="68" width="118" height="9" rx="4.5" fill="rgba(90,90,110,0.14)"/>
  <rect x="16" y="84" width="140" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <rect x="16" y="100" width="90"  height="9" rx="4.5" fill="rgba(90,90,110,0.12)"/>
  <!-- Source tag -->
  <rect x="14" y="122" width="100" height="18" rx="9" fill="rgba(146,168,165,0.14)" stroke="rgba(146,168,165,0.22)" stroke-width="1"/>
  <text x="64" y="134" text-anchor="middle" fill="#6A9490"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9.5" font-weight="600">Lex Fridman</text>
</g>

<!-- ═══════════════════════════════════════════
     CARD 4 — Personal note (sand) — bottom left, right tilt
     ═══════════════════════════════════════════ -->
<g transform="translate(148, 322) rotate(3.5, 86, 68)" filter="url(#cs)">
  <rect width="172" height="136" rx="18" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.68)" stroke-width="1.2"/>
  <!-- Top strip -->
  <rect width="172" height="34" rx="18" ry="18" fill="rgba(198,191,162,0.20)"/>
  <rect y="17" width="172" height="17" fill="rgba(198,191,162,0.20)"/>
  <text x="16" y="22" fill="#8A7E56"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" letter-spacing="0.06em">📝  THOUGHT</text>
  <!-- Text lines -->
  <rect x="16" y="50" width="132" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <rect x="16" y="66" width="102" height="9" rx="4.5" fill="rgba(90,90,110,0.14)"/>
  <rect x="16" y="82" width="120" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <!-- Source tag -->
  <rect x="14" y="106" width="80" height="18" rx="9" fill="rgba(198,191,162,0.16)" stroke="rgba(198,191,162,0.24)" stroke-width="1"/>
  <text x="54" y="118" text-anchor="middle" fill="#8A7E56"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9.5" font-weight="600">Personal</text>
</g>

<!-- ═══════════════════════════════════════════
     CARD 5 — Series note (teal) — bottom right, left tilt
     ═══════════════════════════════════════════ -->
<g transform="translate(660, 310) rotate(-3, 90, 72)" filter="url(#cs)">
  <rect width="180" height="144" rx="18" fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.68)" stroke-width="1.2"/>
  <!-- Top strip -->
  <rect width="180" height="35" rx="18" ry="18" fill="rgba(106,135,145,0.14)"/>
  <rect y="17" width="180" height="18" fill="rgba(106,135,145,0.14)"/>
  <text x="16" y="23" fill="#6A8791"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" letter-spacing="0.06em">📺  SERIES NOTE</text>
  <!-- Text lines -->
  <rect x="16" y="52" width="140" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <rect x="16" y="68" width="110" height="9" rx="4.5" fill="rgba(90,90,110,0.14)"/>
  <rect x="16" y="84" width="130" height="9" rx="4.5" fill="rgba(90,90,110,0.18)"/>
  <!-- Source tag -->
  <rect x="14" y="112" width="96" height="18" rx="9" fill="rgba(106,135,145,0.12)" stroke="rgba(106,135,145,0.20)" stroke-width="1"/>
  <text x="62" y="124" text-anchor="middle" fill="#6A8791"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9.5" font-weight="600">The Wire</text>
</g>

<!-- Caption strip at bottom -->
<rect x="0" y="486" width="1000" height="54" fill="rgba(28,28,30,0.04)"/>
<text x="500" y="516" text-anchor="middle" fill="#5A5A6E"
      font-family="Georgia,'Times New Roman',serif"
      font-size="17" font-style="italic">"Every highlight lives in isolation. Every idea fades alone in a notebook that never opens again."</text>
</svg>
