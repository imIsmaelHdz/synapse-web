<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F6F5F3"/>
    <stop offset="100%" stop-color="#EDECE8"/>
  </linearGradient>
  <radialGradient id="oa" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#CFCFCC" stop-opacity="0.65"/>
    <stop offset="100%" stop-color="#CFCFCC" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ob" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#DDD7CD" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#DDD7CD" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="lgbg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7B9EAB"/>
    <stop offset="100%" stop-color="#526E7A"/>
  </linearGradient>
  <filter id="cshadow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="10" stdDeviation="28" flood-color="#00000010"/>
    <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000008"/>
  </filter>
</defs>

<!-- Background -->
<rect width="1200" height="630" fill="url(#bg)"/>

<!-- Ambient orbs -->
<ellipse cx="-80" cy="-50" rx="480" ry="480" fill="url(#oa)"/>
<ellipse cx="1280" cy="690" rx="420" ry="420" fill="url(#ob)"/>
<ellipse cx="200" cy="595" rx="270" ry="270" fill="#D8D6D3" opacity="0.28"/>
<ellipse cx="1020" cy="55" rx="210" ry="210" fill="#E0DAD4" opacity="0.26"/>

<!-- Background graph edges (very faint) -->
<g opacity="0.075" stroke="#5E7A88" fill="none" stroke-width="1">
  <line x1="60" y1="150" x2="148" y2="218"/>
  <line x1="148" y1="218" x2="100" y2="355"/>
  <line x1="60" y1="150" x2="100" y2="355"/>
  <line x1="100" y1="355" x2="52" y2="440"/>
  <line x1="52" y1="440" x2="125" y2="510"/>
  <line x1="1095" y1="128" x2="1155" y2="268"/>
  <line x1="1155" y1="268" x2="1102" y2="402"/>
  <line x1="1095" y1="128" x2="1102" y2="402"/>
  <line x1="1102" y1="402" x2="1148" y2="492"/>
  <line x1="1148" y1="492" x2="1090" y2="558"/>
</g>
<g opacity="0.13" fill="#6A8791">
  <circle cx="60"  cy="150" r="7"/>
  <circle cx="148" cy="218" r="5"/>
  <circle cx="100" cy="355" r="9"/>
  <circle cx="52"  cy="440" r="5"/>
  <circle cx="125" cy="510" r="4"/>
  <circle cx="1095" cy="128" r="6"/>
  <circle cx="1155" cy="268" r="5"/>
  <circle cx="1102" cy="402" r="9"/>
  <circle cx="1148" cy="492" r="5"/>
  <circle cx="1090" cy="558" r="4"/>
</g>

<!-- Main glass card -->
<rect x="228" y="90" width="744" height="450" rx="28"
      fill="rgba(255,255,255,0.38)" stroke="rgba(255,255,255,0.66)" stroke-width="1.5"
      filter="url(#cshadow)"/>

<!-- Article badge -->
<rect x="452" y="130" width="296" height="30" rx="15"
      fill="rgba(229,154,120,0.14)" stroke="rgba(229,154,120,0.28)" stroke-width="1"/>
<circle cx="473" cy="145" r="4" fill="#E59A78"/>
<text x="600" y="150" text-anchor="middle" fill="#C67050"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
      font-size="10.5" font-weight="700" letter-spacing="1.6">FOUNDER'S STORY  ·  PART 1</text>

<!-- Title line 1 -->
<text x="600" y="256" text-anchor="middle" fill="#1C1C1E"
      font-family="Georgia,'Times New Roman',serif"
      font-size="52" letter-spacing="-0.5">The making of</text>

<!-- Title line 2 — Synapse italic teal -->
<text x="600" y="344" text-anchor="middle" fill="#6A8791"
      font-family="Georgia,'Times New Roman',serif"
      font-size="76" font-style="italic" letter-spacing="-1">Synapse</text>

<!-- Subtitle -->
<text x="600" y="397" text-anchor="middle" fill="#5A5A6E"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
      font-size="15">Architecture decisions, wrong turns, and everything in between</text>

<!-- Divider -->
<line x1="395" y1="426" x2="805" y2="426" stroke="rgba(106,135,145,0.15)" stroke-width="1"/>

<!-- Tech pills -->
<g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" font-weight="600">
  <rect x="328" y="440" width="70" height="24" rx="12" fill="rgba(106,135,145,0.10)" stroke="rgba(106,135,145,0.22)" stroke-width="1"/>
  <text x="363" y="456" text-anchor="middle" fill="#6A8791">Flutter</text>

  <rect x="412" y="440" width="56" height="24" rx="12" fill="rgba(229,154,120,0.12)" stroke="rgba(229,154,120,0.25)" stroke-width="1"/>
  <text x="440" y="456" text-anchor="middle" fill="#C67050">Hive</text>

  <rect x="482" y="440" width="80" height="24" rx="12" fill="rgba(106,135,145,0.10)" stroke="rgba(106,135,145,0.22)" stroke-width="1"/>
  <text x="522" y="456" text-anchor="middle" fill="#6A8791">Firebase</text>

  <rect x="576" y="440" width="66" height="24" rx="12" fill="rgba(146,168,165,0.12)" stroke="rgba(146,168,165,0.25)" stroke-width="1"/>
  <text x="609" y="456" text-anchor="middle" fill="#92A8A5">Fastify</text>

  <rect x="656" y="440" width="70" height="24" rx="12" fill="rgba(198,191,162,0.14)" stroke="rgba(198,191,162,0.28)" stroke-width="1"/>
  <text x="691" y="456" text-anchor="middle" fill="#8A7E56">Gemini</text>

  <rect x="740" y="440" width="72" height="24" rx="12" fill="rgba(92,100,112,0.10)" stroke="rgba(92,100,112,0.18)" stroke-width="1"/>
  <text x="776" y="456" text-anchor="middle" fill="#5C6470">Railway</text>
</g>

<!-- Synapse logo — top-right of card -->
<g transform="translate(922, 108)">
  <rect width="42" height="42" rx="11" fill="url(#lgbg)"/>
  <line x1="21" y1="20" x2="21" y2="8"  stroke="rgba(255,255,255,0.60)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="21" y1="20" x2="31" y2="14" stroke="rgba(255,255,255,0.60)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="21" y1="20" x2="31" y2="28" stroke="rgba(255,255,255,0.60)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="21" y1="20" x2="20" y2="33" stroke="rgba(255,255,255,0.60)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="21" y1="20" x2="11" y2="27" stroke="rgba(255,255,255,0.60)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="21" y1="20" x2="11" y2="13" stroke="rgba(255,255,255,0.60)" stroke-width="1.9" stroke-linecap="round"/>
  <circle cx="21" cy="8"  r="3"   fill="#EAE8E2"/>
  <circle cx="31" cy="14" r="3"   fill="#D6E6E4"/>
  <circle cx="31" cy="28" r="2.3" fill="#EAE8E2"/>
  <circle cx="20" cy="33" r="3"   fill="#D6E6E4"/>
  <circle cx="11" cy="27" r="3"   fill="#EAE8E2"/>
  <circle cx="11" cy="13" r="2.3" fill="#D6E6E4"/>
  <circle cx="21" cy="20" r="6"   fill="#E59A78"/>
</g>
</svg>
