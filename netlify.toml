[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"

# ── Static page routing ────────────────────────────────────────────────────────
# Serve named HTML pages directly; fall through to 404 for unknown paths.
[[redirects]]
  from   = "/lab"
  to     = "/lab.html"
  status = 200

[[redirects]]
  from   = "/atelier"
  to     = "/atelier.html"
  status = 200

[[redirects]]
  from   = "/story"
  to     = "/story.html"
  status = 200

[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 200

[[redirects]]
  from   = "/support"
  to     = "/support.html"
  status = 200

[[redirects]]
  from   = "/delete-account"
  to     = "/delete-account.html"
  status = 200

# ── Security headers (all pages) ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.brevo.com; frame-ancestors 'none';"

# ── Cache static assets ───────────────────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/icon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
